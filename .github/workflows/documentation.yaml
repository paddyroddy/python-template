---
name: Documentation

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  documentation:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/python/pdoc@7a1cfa6fb4fcc2151803cb6f2cbbe6474dc7f860 # v0
        with:
          docs-dependency-section: docs
          gh-pages-publish-directory: ./html/example_package
          github-token: ${{ secrets.GITHUB_TOKEN }}
          project-directory: ./src/example_package
          pyproject-toml: ./pyproject.toml
          python-version: "3.14"
          template-directory: ./documentation
